<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>舆情监控</title>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' data: https://fonts.gstatic.com;
    img-src 'self' data: https: blob:;
    media-src 'self' data:;
    connect-src 'self' ws://localhost:* http://localhost:* https://fonts.googleapis.com;
  ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">
  <script>
    (() => {
      if (!document.documentElement) return
      // Support both Electron (window.electronAPI.bootstrap) and web fallback
      const bootstrap = window.electronAPI?.bootstrap
      const theme = bootstrap?.theme === 'dark' ? 'dark' : 'light'
      const colorScheme = typeof bootstrap?.colorScheme === 'string' && bootstrap.colorScheme.trim()
        ? bootstrap.colorScheme.trim()
        : 'ocean'
      const locale = typeof bootstrap?.locale === 'string' && bootstrap.locale.trim()
        ? bootstrap.locale.trim()
        : 'zh-CN'

      document.documentElement.setAttribute('data-theme', theme)
      document.documentElement.setAttribute('data-color-scheme', colorScheme)
      document.documentElement.setAttribute('data-locale', locale)
      document.documentElement.setAttribute('lang', locale === 'zh-CN' ? 'zh' : 'en')
      document.documentElement.style.backgroundColor = theme === 'dark' ? '#212121' : '#F7F7F8'
      document.documentElement.style.colorScheme = theme
    })()
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F7F8;
      overflow: hidden;
      transition: background-color 0.2s;
    }
    html[data-theme="dark"], html[data-theme="dark"] body { background: #212121; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/pages/main/main.js"></script>
</body>
</html>
